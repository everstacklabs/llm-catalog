name: "groq"
display_name: "Groq"
base_url: "https://api.groq.com/openai/v1"
api_version: "2024-01-01"

provider_type: "meta"
supports_model_discovery: false

auth:
  type: "api_key"
  header_name: "Authorization"
  header_format: "Bearer {api_key}"
  env_var: "GROQ_API_KEY"

rate_limits:
  requests_per_minute: 1800
  tokens_per_minute: 300000
  concurrent_requests: 40

capabilities:
  chat: true
  completions: true
  embeddings: false
  function_calling: true
  vision: true
  streaming: true
  fine_tuning: false
  assistants: false

model_families:
  llama:
    description: "Llama family via Groq"
    capabilities: ["chat", "function_calling"]
  deepseek:
    description: "DeepSeek family via Groq"
    capabilities: ["chat", "function_calling"]
  qwen:
    description: "Qwen family via Groq"
    capabilities: ["chat", "function_calling"]
