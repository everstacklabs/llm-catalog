name: "moonshot"
display_name: "Moonshot AI"
base_url: "https://api.moonshot.ai/v1"
api_version: "v1"

provider_type: "static"
supports_model_discovery: false

auth:
  type: "api_key"
  header_name: "Authorization"
  header_format: "Bearer {api_key}"
  env_var: "MOONSHOT_API_KEY"

rate_limits:
  requests_per_minute: 500
  tokens_per_minute: 1000000
  concurrent_requests: 50

capabilities:
  chat: true
  completions: false
  embeddings: false
  function_calling: true
  vision: true
  streaming: true
  fine_tuning: false
  assistants: false

model_families:
  kimi-k2.5:
    description: "Kimi K2.5 — 1T param flagship with native multimodal and thinking"
    capabilities: ["chat", "function_calling", "vision"]
    max_tokens: 262144
  kimi-k2:
    description: "Kimi K2 — reasoning and general-purpose models"
    capabilities: ["chat", "function_calling"]
    max_tokens: 262144
  moonshot-v1:
    description: "Moonshot V1 legacy models — various context lengths"
    capabilities: ["chat", "function_calling", "vision"]
    max_tokens: 131072

defaults:
  temperature: 0.7
  max_tokens: 2048
  top_p: 1.0
  timeout: 60s
  retry_attempts: 3
  retry_delay: 1s

error_mapping:
  "rate_limit_exceeded": "rate_limit_exceeded"
  "payment_required": "payment_required"
  "model_not_found": "model_unavailable"
  "invalid_api_key": "authentication_failed"
