high_performance:
  name: "High Performance"
  description: "Optimized for high throughput and low latency"
  settings:
    timeout: 30s
    retry_attempts: 2
    retry_delay: 500ms
    connection_pool_size: 50
    max_concurrent_requests: 25

cost_optimized:
  name: "Cost Optimized"
  description: "Optimized for cost efficiency with smaller models"
  settings:
    timeout: 120s
    retry_attempts: 1
    retry_delay: 2s
    connection_pool_size: 10
    max_concurrent_requests: 5
  recommended_models:
    - qwen3-8b
    - qwen3-14b
    - qwen3.5-flash

reliability:
  name: "High Reliability"
  description: "Optimized for maximum reliability"
  settings:
    timeout: 180s
    retry_attempts: 5
    retry_delay: 2s
    connection_pool_size: 25
    max_concurrent_requests: 10
    circuit_breaker_enabled: true

coding:
  name: "Coding Assistant"
  description: "Optimized for code generation and review"
  settings:
    temperature: 0.2
    max_tokens: 8192
  recommended_models:
    - qwen3-max
    - qwen3-235b-a22b
    - qwen3-32b

reasoning:
  name: "Reasoning Tasks"
  description: "Optimized for complex reasoning and problem solving"
  settings:
    temperature: 0.3
    max_tokens: 16384
  recommended_models:
    - qwq-plus
    - qwen3-max

multimodal:
  name: "Multimodal Understanding"
  description: "Optimized for vision-language tasks"
  settings:
    temperature: 0.5
    max_tokens: 4096
  recommended_models:
    - qwen-vl-max
    - qwen-vl-plus
    - qwen3.5-plus
