name: "together"
display_name: "Together AI"
base_url: "https://api.together.xyz/v1"
api_version: "2024-01-01"

provider_type: "meta"
supports_model_discovery: false

auth:
  type: "api_key"
  header_name: "Authorization"
  header_format: "Bearer {api_key}"
  env_var: "TOGETHER_API_KEY"

rate_limits:
  requests_per_minute: 1200
  tokens_per_minute: 240000
  concurrent_requests: 30

capabilities:
  chat: true
  completions: true
  embeddings: true
  function_calling: true
  vision: true
  streaming: true
  fine_tuning: false
  assistants: false

model_families:
  llama:
    description: "Llama family via Together"
    capabilities: ["chat", "function_calling"]
  deepseek:
    description: "DeepSeek family via Together"
    capabilities: ["chat", "function_calling"]
  qwen:
    description: "Qwen family via Together"
    capabilities: ["chat", "function_calling"]
  flux:
    description: "Image generation models via Together"
    capabilities: ["vision"]
