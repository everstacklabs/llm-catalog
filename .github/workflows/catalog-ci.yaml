name: Catalog CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout catalog
        uses: actions/checkout@v4

      - name: Checkout Sentinel
        uses: actions/checkout@v4
        with:
          repository: everstacklabs/sentinel
          path: sentinel

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26"

      - name: Validate catalog
        working-directory: sentinel
        run: go run ./cmd/sentinel validate --catalog-path="$GITHUB_WORKSPACE"

      - name: Check manifest
        run: |
          generated_at="$(awk -F'"' '/generated_at:/ { print $2; exit }' manifest.yaml)"
          MANIFEST_GENERATED_AT="$generated_at" ./scripts/generate-manifest.sh
          git diff --exit-code -- manifest.yaml
